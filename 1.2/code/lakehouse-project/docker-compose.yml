version: "3.8"

services:
# ======================
# MINIO
# ======================
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    platform: linux/amd64
    container_name: minio
    command: server --console-address ":9001" http://minio/data/disk{1...4}
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_MIN_FREE_SPACE: 1MB # reduce threshold for testing
    volumes:
      - type: bind
        source: ./data/disk1
        target: /data/disk1
      - type: bind
        source: ./data/disk2
        target: /data/disk2
      - type: bind
        source: ./data/disk3
        target: /data/disk3
      - type: bind
        source: ./data/disk4
        target: /data/disk4
# ======================
# POSTGRES for Superset
# ======================
  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
# ======================
# SPARK
# ======================
  spark-master:
    image: apache/spark:3.5.0
    platform: linux/amd64
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    depends_on:
      - minio
  spark-worker:
    image: apache/spark:3.5.0
    platform: linux/amd64
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
# ======================
# HIVE METASTORE DB
# ======================
  metastore-db:
    image: postgres:15-alpine
    container_name: hive-metastore-db
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    ports:
      - "5433:5432"
# ======================
# HIVE METASTORE
# ======================
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      - metastore-db
      - minio
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      SKIP_SCHEMA_INIT: "true"
      DB_TYPE: postgres
      DB_HOST: metastore-db
      DB_PORT: 5432
      DB_NAME: metastore
      DB_USER: hive
      DB_PASSWORD: hive
    volumes:
      - ./hive-site.xml:/opt/hive/conf/hive-site.xml:ro
# ======================
# TRINO
# ======================
  trino:
    image: trinodb/trino:latest
    platform: linux/amd64
    container_name: trino
    ports:
      - "8085:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/metastore:/etc/trino/hive-metastore
    depends_on:
      - hive-metastore
      - minio
# ======================
# SUPERSET
# ======================
  superset:
    image: apache/superset:3.1.0
    platform: linux/amd64
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: supersecretkey
      DATABASE_URL: postgresql+psycopg2://superset:superset@postgres:5432/superset
    depends_on:
      - postgres
    command: >
      /bin/bash -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@local.com --passwordadmin &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "

volumes:
  postgres-data: