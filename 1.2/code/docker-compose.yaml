services:
  # ======================
  # MINIO
  # ======================
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    platform: linux/arm64
    container_name: minio
    command: server --console-address ":9001" http://minio/data/disk{1...4}
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_MIN_FREE_SPACE: 1MB  # reduce threshold for testing
    volumes:
      - type: bind
        source: ./data/disk1
        target: /data/disk1
      - type: bind
        source: ./data/disk2
        target: /data/disk2
      - type: bind
        source: ./data/disk3
        target: /data/disk3
      - type: bind
        source: ./data/disk4
        target: /data/disk4

  # ======================
  # POSTGRES for Superset
  # ======================
  postgres:
    image: postgres:15-alpine
    platform: linux/arm64
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ======================
  # SPARK
  # ======================
  spark-master:
    image: apache/spark:3.5.0
    platform: linux/arm64
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    depends_on:
      - minio

  spark-worker:
    image: apache/spark:3.5.0
    platform: linux/arm64
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master

  # Hive metastore
  hive-metastore:
    image: apache/hive:3.1.3
    platform: linux/amd64
    container_name: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
    ports:
      - "9083:9083"

  # ======================
  # TRINO
  # ======================
  trino:
     image: trinodb/trino:latest
     container_name: trino
     platform: linux/arm64
     ports:
       - "8085:8080"
     environment:
       TRINO_CONFIG: /etc/trino
     volumes:
       - ./trino/catalog:/etc/trino/catalog
       - ./trino/metastore:/etc/trino/hive-metastore
     depends_on:
       - hive-metastore
       - postgres

  # ======================
  # SUPERSET
  # ======================
  superset:
    image: apache/superset:3.1.0
    platform: linux/arm64
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: supersecretkey
      DATABASE_URL: postgresql+psycopg2://superset:superset@postgres:5432/superset
    depends_on:
      - postgres
    command: >
      /bin/bash -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Superset --lastname Admin --email admin@local.com --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
      "

# ======================
# Named Volumes
# ======================
volumes:
  postgres-data: